; docker/supervisord.conf · v0.3 spec §37.1
; 拉 2 进程: backend (TypeScript) + deerflow (Python daemon)
[supervisord]
nodaemon=true
user=root
logfile=/var/log/supervisord.log
pidfile=/var/run/supervisord.pid

[program:backend]
command=node /app/apps/backend/dist/server.js
user=dasheng
autostart=true
autorestart=true
startretries=5
startsecs=5
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0
environment=NODE_ENV=production,DEERFLOW_ENABLED=true
priority=10

[program:deerflow]
command=/usr/local/bin/start-deerflow
user=dasheng
autostart=true
autorestart=true
startretries=5
startsecs=10
priority=20
stdout_logfile=/var/log/deerflow.log
stdout_logfile_maxbytes=10MB
stderr_logfile=/var/log/deerflow.err
stderr_logfile_maxbytes=10MB
environment=DEERFLOW_SOCKET_PATH=/var/run/dasheng/deerflow.sock,PYTHONUNBUFFERED=1
