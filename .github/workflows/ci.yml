# .github/workflows/ci.yml · v0.3 Phase 5+
#
# Runs on every push + PR to main/develop.
# Pipeline: install → lint → test → build (web + backend + sandbox)
#
# Concurrency: cancels in-flight runs on the same branch when a new
# commit is pushed (saves CI minutes).

name: ci

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ===========================================================================
  # Lint + type-check
  # ===========================================================================
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: apps/web lint
        run: cd apps/web && pnpm lint
      - name: apps/web tsc
        run: cd apps/web && pnpm exec tsc -b

  # ===========================================================================
  # Frontend tests (vitest a11y)
  # ===========================================================================
  test-web:
    name: Test · apps/web
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: vitest
        run: cd apps/web && pnpm vitest run --reporter=verbose

  # ===========================================================================
  # Backend build + (optional) smoke
  # ===========================================================================
  build-backend:
    name: Build · packages/backend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: tsc + build
        run: cd packages/backend && pnpm exec tsc -b
      - name: smoke (boot the server for 10s, hit /healthz)
        run: |
          cd packages/backend
          pnpm dev > /tmp/backend.log 2>&1 &
          BACKEND_PID=$!
          sleep 8
          curl -sf http://127.0.0.1:8000/api/v1/system/healthz && echo "OK"
          kill $BACKEND_PID 2>/dev/null || true

  # ===========================================================================
  # Sandbox build (Go cross-compile + unit tests)
  # ===========================================================================
  build-sandbox:
    name: Build · sandbox (Go)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.23'
          cache-dependency-path: sandbox/go.sum
      - name: unit tests (linux-only)
        working-directory: sandbox
        run: |
          GOOS=linux go test -v ./internal/handlers/... ./internal/security/...
      - name: build linux binaries
        working-directory: sandbox
        run: |
          mkdir -p bin
          GOOS=linux GOARCH=amd64 go build -o bin/sandbox ./cmd/sandbox
          GOOS=linux GOARCH=amd64 go build -o bin/supervisord ./cmd/supervisord
          GOOS=linux GOARCH=amd64 go build -o bin/sandbox-exporter ./cmd/sandbox-exporter
          ls -la bin/
      - name: upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: sandbox-linux-amd64
          path: sandbox/bin/
          if-no-files-found: error

  # ===========================================================================
  # Build · apps/web (artifact reused by lighthouse)
  # ===========================================================================
  build-web:
    name: Build · apps/web
    runs-on: ubuntu-latest
    needs: test-web
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: vite build
        run: cd apps/web && pnpm build
      - name: upload web dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: web-dist
          path: apps/web/dist
          if-no-files-found: error
          retention-days: 3

  # ===========================================================================
  # Lighthouse a11y/perf (PR-only, budget: $0)
  # ===========================================================================
  lighthouse:
    name: Lighthouse · a11y+perf
    runs-on: ubuntu-latest
    needs: build-web
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: web-dist
          path: apps/web/dist
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: start preview
        run: cd apps/web && pnpm preview &
      - name: wait for server
        run: sleep 5
      - name: lighthouse-ci
        uses: treosh/lighthouse-ci-action@v11
        with:
          configPath: apps/web/lighthouserc.json
          uploadArtifacts: true
          temporaryPublicStorage: true
