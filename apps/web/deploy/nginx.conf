# apps/web/deploy/nginx.conf · DaShengOS v0.3 web 静态服务
#
# SPA fallback: 任何不匹配的 URL 都返 index.html (React Router 处理)
# 静态资源 cache 1 年, index.html 不 cache (让部署立即生效)

server {
    listen 3000;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # gzip 压缩
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;
    gzip_min_length 256;

    # 静态资源 (vite 产物自带 hash, 长 cache 安全)
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # API 反代到 backend (生产同源部署, CORS 干净)
    # 用变量 + Docker 内部 DNS resolver 解决 nginx 启动时 backend 可能还没起来
    location /api/ {
        set $backend_upstream http://backend:8000;
        resolver 127.0.0.11 valid=10s;
        proxy_pass $backend_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # 启动时 backend 不可达不致命 (nginx 会持续解析)
        proxy_next_upstream error timeout;
    }

    # SPA fallback — 所有非静态都返 index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # 健康检查
    location /healthz {
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }
}
