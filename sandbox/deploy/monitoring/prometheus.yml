# Prometheus config · DaShengOS v0.3 Phase 4
# Scrapes the sandbox via a sidecar exporter (sandbox-exporter) that
# bridges the Unix-socket metrics.snapshot to HTTP /metrics.

global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    cluster: dasheng-dev
    component: sandbox

scrape_configs:
  # Prometheus self-metrics
  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]

  # DaShengOS backend (Phase 8: prom-client /api/v1/metrics)
  - job_name: dasheng-backend
    metrics_path: /api/v1/metrics
    scrape_interval: 15s
    scrape_timeout: 5s
    static_configs:
      - targets: ["backend:8000"]
        labels:
          service: backend
          env: dev
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
        regex: '([^:]+):.*'
        replacement: '$1'

  # DaShengOS sandbox (via sandbox-exporter sidecar)
  - job_name: dasheng-sandbox
    metrics_path: /metrics
    scrape_interval: 15s
    scrape_timeout: 5s
    static_configs:
      - targets: ["sandbox-exporter:9100"]
        labels:
          service: sandbox
          env: dev
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
        regex: '([^:]+):.*'
        replacement: '$1'

# Alert rules (extend in Phase 4 hardening)
rule_files:
  - "/etc/prometheus/rules/*.yml"
